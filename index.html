<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>

    <link rel="stylesheet" href="style.css">

    <!-- IMPORTANT: defer prevents loading issues -->
    <script src="script.js" defer></script>
</head>

<body>

    <div class="container">

        <h1>🔐 Password Generator</h1>

        <div class="display">

            <input type="text" id="password" placeholder="Generated Password" readonly>

            <button id="copyBtn">📋</button>

        </div>

        <div class="length">

            <label>
                Password Length:
                <span id="lengthValue">12</span>
            </label>

            <input type="range" id="length" min="4" max="20" value="12">

        </div>

        <div class="options">

            <label><input type="checkbox" id="uppercase" checked> Uppercase</label>
            <label><input type="checkbox" id="lowercase" checked> Lowercase</label>
            <label><input type="checkbox" id="numbers" checked> Numbers</label>
            <label><input type="checkbox" id="symbols" checked> Symbols</label>

        </div>

        <button id="generateBtn" type="button">Generate Password</button>

        <p id="strength">Strength: -</p>

        <hr>

        <p class="footer">Made with ❤️ by Anwesha</p>

    </div>

</body>

</html>
